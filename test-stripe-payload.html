<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Stripe Payload</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .test-case { border: 1px solid #ddd; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .test-case h3 { margin-top: 0; }
        button { background: #5469d4; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #4355c7; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 4px; overflow-x: auto; }
        .success { color: #0f9d58; }
        .error { color: #d93025; }
    </style>
</head>
<body>
    <h1>🧪 Stripe Payload Test</h1>
    <p>This page tests what data is being sent to the Stripe API</p>

    <div class="test-case">
        <h3>Test Case: Single Book with Discount</h3>
        <button onclick="testStripePayload()">Test Stripe API Call</button>
        <div id="result"></div>
    </div>

    <script>
        async function testStripePayload() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing...</p>';

            const testData = {
                items: [
                    {
                        id: 1,
                        title: 'Suncatcher Spirit',
                        name: 'Suncatcher Spirit',
                        price: 18.99,
                        qty: 1,
                        quantity: 1,
                        image: 'assets/suncatcher-cover.jpg'
                    }
                ],
                customer: { name: 'Test User', email: 'test@example.com' },
                discountAmount: 2.85,
                discountCode: 'SUNCATCHER',
                shipping: 9.99,
                tax: 1.37,
                taxRate: 0.085,
                subtotal: 18.99,
                total: 27.51,
                successUrl: location.origin + '/success.html?session_id={CHECKOUT_SESSION_ID}',
                cancelUrl: location.origin + '/cart.html'
            };

            console.log('📤 Test payload being sent:', testData);

            try {
                // Try to determine server URL
                const serverUrl = (window.YAYA_CONFIG && window.YAYA_CONFIG.serverUrl) 
                    ? window.YAYA_CONFIG.serverUrl 
                    : '';
                
                const endpoint = serverUrl + '/create-stripe-session';
                console.log('🌐 Sending to:', endpoint);

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });

                console.log('📥 Response status:', response.status);
                const data = await response.json();
                console.log('📥 Response data:', data);

                let html = '<h4 class="success">✅ API Call Successful</h4>';
                html += '<p><strong>Endpoint:</strong> ' + endpoint + '</p>';
                html += '<p><strong>Response:</strong></p>';
                html += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                html += '<h4>Payload Sent:</h4>';
                html += '<pre>' + JSON.stringify(testData, null, 2) + '</pre>';

                if (data.url) {
                    html += '<p class="success">✅ Stripe checkout URL generated successfully!</p>';
                    html += '<p><a href="' + data.url + '" target="_blank">Open Stripe Checkout</a></p>';
                }

                resultDiv.innerHTML = html;
            } catch (error) {
                console.error('❌ Error:', error);
                let html = '<h4 class="error">❌ API Call Failed</h4>';
                html += '<p><strong>Error:</strong> ' + error.message + '</p>';
                html += '<h4>Payload Attempted:</h4>';
                html += '<pre>' + JSON.stringify(testData, null, 2) + '</pre>';
                resultDiv.innerHTML = html;
            }
        }

        // Log initial config
        console.log('🔧 Window config:', {
            hasYAYA_CONFIG: !!window.YAYA_CONFIG,
            serverUrl: window.YAYA_CONFIG?.serverUrl
        });
    </script>
</body>
</html>
