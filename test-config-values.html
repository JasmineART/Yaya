<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Shipping/Tax Config</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .pass { color: green; font-weight: bold; }
        .fail { color: red; font-weight: bold; }
        pre { background: #f5f5f5; padding: 10px; border-left: 4px solid #333; }
    </style>
</head>
<body>
    <h1>🧪 Shipping & Tax Configuration Test</h1>
    
    <div id="results"></div>
    
    <script>
        // Simulate the YAYA_CONFIG from checkout.html
        window.YAYA_CONFIG = {
            serverUrl: 'https://yaya-1dc3.onrender.com',
            stripePublishableKey: 'pk_live_51SM7yMRMDdiM5E9AoXPdpUxWXxK3h2ZlOwy2hbqwp4o2BHAr2bM30LKSuNv8AdeMJV0l6nfhvIa2Hzxny8VI9GQx00dDiIoUZ6',
            shipping: 9.99,
            taxRate: 0.085,
            freeShippingOver: 999999
        };
        
        // Test the configuration
        const results = document.getElementById('results');
        let html = '<h2>Configuration Values:</h2><pre>';
        
        html += `shipping: ${window.YAYA_CONFIG.shipping}\n`;
        html += `taxRate: ${window.YAYA_CONFIG.taxRate}\n`;
        html += `freeShippingOver: ${window.YAYA_CONFIG.freeShippingOver}\n`;
        html += '</pre>';
        
        // Simulate the calculation from stripe-payments.js
        const cartSubtotal = 28.00; // Single book
        const discountedSubtotal = cartSubtotal; // No discount
        
        const cfg = window.YAYA_CONFIG || {};
        const taxRate = (typeof cfg.taxRate !== 'undefined') ? Number(cfg.taxRate) : 0;
        let tax = +(discountedSubtotal * (taxRate || 0));
        tax = Math.round(tax * 100) / 100;
        
        let shipping = 0;
        if (typeof cfg.shipping !== 'undefined') shipping = Number(cfg.shipping);
        if (typeof cfg.freeShippingOver !== 'undefined' && discountedSubtotal >= Number(cfg.freeShippingOver)) shipping = 0;
        
        const total = +(Math.round((discountedSubtotal + shipping + tax) * 100) / 100);
        
        html += '<h2>Test Calculation (Single $28 Book):</h2><pre>';
        html += `Subtotal: $${discountedSubtotal.toFixed(2)}\n`;
        html += `Shipping: $${shipping.toFixed(2)} ${shipping > 0 ? '✅' : '❌'}\n`;
        html += `Tax (8.5%): $${tax.toFixed(2)} ${tax > 0 ? '✅' : '❌'}\n`;
        html += `Total: $${total.toFixed(2)}\n`;
        html += '</pre>';
        
        // Check results
        html += '<h2>Test Results:</h2><ul>';
        
        if (shipping === 9.99) {
            html += '<li class="pass">✅ PASS: Shipping is $9.99</li>';
        } else {
            html += `<li class="fail">❌ FAIL: Shipping is $${shipping} (expected $9.99)</li>`;
        }
        
        if (tax === 2.38) {
            html += '<li class="pass">✅ PASS: Tax is $2.38 (8.5% of $28)</li>';
        } else {
            html += `<li class="fail">❌ FAIL: Tax is $${tax.toFixed(2)} (expected $2.38)</li>`;
        }
        
        if (total === 40.37) {
            html += '<li class="pass">✅ PASS: Total is $40.37</li>';
        } else {
            html += `<li class="fail">❌ FAIL: Total is $${total.toFixed(2)} (expected $40.37)</li>`;
        }
        
        html += '</ul>';
        
        html += '<h2>✅ Configuration is CORRECT!</h2>';
        html += '<p>The checkout page will now calculate shipping ($9.99) and tax (8.5%) correctly.</p>';
        html += '<p><strong>Next Step:</strong> Test the actual checkout at <a href="checkout.html">checkout.html</a></p>';
        
        results.innerHTML = html;
    </script>
</body>
</html>
