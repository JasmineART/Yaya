<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Comprehensive Cart Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
    .pass { color: #0f0; }
    .fail { color: #f00; }
    .warn { color: #ff0; }
    button { margin: 5px; padding: 10px; cursor: pointer; }
    #results { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>🧪 Comprehensive Cart Functionality Test</h1>
  
  <div>
    <button onclick="runAllTests()">▶ Run All Tests</button>
    <button onclick="clearResults()">Clear Results</button>
    <button onclick="clearCart()">Clear Cart</button>
  </div>
  
  <div id="results"></div>
  
  <script src="products.js"></script>
  <script src="app.js"></script>
  <script>
    let results = '';
    
    function log(msg, type = 'pass') {
      const symbol = type === 'pass' ? '✅' : type === 'fail' ? '❌' : '⚠️';
      const className = type === 'pass' ? 'pass' : type === 'fail' ? 'fail' : 'warn';
      results += symbol + ' ' + msg + '\n';
      document.getElementById('results').innerHTML = '<pre class="' + className + '">' + results + '</pre>';
      console.log(symbol + ' ' + msg);
    }
    
    function clearResults() {
      results = '';
      document.getElementById('results').innerHTML = '';
    }
    
    function clearCart() {
      localStorage.removeItem('yaya_cart_v1');
      localStorage.removeItem('yaya_discount_v1');
      if (typeof updateCartCount === 'function') updateCartCount();
      log('Cart cleared', 'warn');
    }
    
    function runAllTests() {
      clearResults();
      log('=== STARTING COMPREHENSIVE TESTS ===\n', 'warn');
      
      // Clear cart first
      localStorage.removeItem('yaya_cart_v1');
      
      let passed = 0;
      let failed = 0;
      
      // Test 1: Products loaded
      log('TEST 1: Products Loading');
      if (typeof window.PRODUCTS !== 'undefined' && window.PRODUCTS.length > 0) {
        log('  Products loaded: ' + window.PRODUCTS.length + ' items');
        passed++;
      } else {
        log('  Products NOT loaded', 'fail');
        failed++;
      }
      
      if (typeof window.products !== 'undefined') {
        log('  Backward compatibility alias exists');
        passed++;
      } else {
        log('  Backward compatibility alias missing', 'fail');
        failed++;
      }
      
      // Test 2: Function availability
      log('\nTEST 2: Function Availability');
      const requiredFunctions = [
        'addToCart', 'getCart', 'getCartTotal', 'updateCartCount', 
        'removeFromCart', 'getCartItems', 'getAppliedDiscount',
        'calculateDiscount', 'saveAppliedDiscount', 'clearAppliedDiscount'
      ];
      
      requiredFunctions.forEach(func => {
        if (typeof window[func] === 'function') {
          log('  ' + func + '() available');
          passed++;
        } else {
          log('  ' + func + '() MISSING', 'fail');
          failed++;
        }
      });
      
      // Test 3: localStorage
      log('\nTEST 3: localStorage Functionality');
      try {
        localStorage.setItem('test_key', 'test_value');
        const val = localStorage.getItem('test_key');
        localStorage.removeItem('test_key');
        if (val === 'test_value') {
          log('  localStorage working');
          passed++;
        } else {
          log('  localStorage not working correctly', 'fail');
          failed++;
        }
      } catch(e) {
        log('  localStorage ERROR: ' + e.message, 'fail');
        failed++;
      }
      
      // Test 4: Add to cart
      log('\nTEST 4: Add to Cart Functionality');
      try {
        window.addToCart(1, 2);
        const cart = window.getCart();
        if (cart.length === 1 && cart[0].id === 1 && cart[0].qty === 2) {
          log('  addToCart(1, 2) worked correctly');
          passed++;
        } else {
          log('  addToCart failed - cart: ' + JSON.stringify(cart), 'fail');
          failed++;
        }
      } catch(e) {
        log('  addToCart ERROR: ' + e.message, 'fail');
        failed++;
      }
      
      // Test 5: Cart total calculation
      log('\nTEST 5: Cart Total Calculation');
      try {
        const total = window.getCartTotal();
        if (typeof total === 'number' && total > 0) {
          log('  getCartTotal() = $' + total.toFixed(2));
          passed++;
        } else {
          log('  getCartTotal() returned invalid value: ' + total, 'fail');
          failed++;
        }
      } catch(e) {
        log('  getCartTotal ERROR: ' + e.message, 'fail');
        failed++;
      }
      
      // Test 6: Update quantity
      log('\nTEST 6: Update Cart Quantity');
      try {
        window.addToCart(1, 1); // Should increase to 3
        const cart = window.getCart();
        if (cart.length === 1 && cart[0].qty === 3) {
          log('  Quantity updated correctly (2 + 1 = 3)');
          passed++;
        } else {
          log('  Quantity update failed - cart: ' + JSON.stringify(cart), 'fail');
          failed++;
        }
      } catch(e) {
        log('  Update quantity ERROR: ' + e.message, 'fail');
        failed++;
      }
      
      // Test 7: Add different product
      log('\nTEST 7: Add Different Product');
      try {
        window.addToCart(2, 1);
        const cart = window.getCart();
        if (cart.length === 2) {
          log('  Multiple products in cart: ' + cart.length + ' items');
          passed++;
        } else {
          log('  Failed to add second product - cart: ' + JSON.stringify(cart), 'fail');
          failed++;
        }
      } catch(e) {
        log('  Add second product ERROR: ' + e.message, 'fail');
        failed++;
      }
      
      // Test 8: Remove from cart
      log('\nTEST 8: Remove From Cart');
      try {
        const cart = window.getCart();
        const itemToRemove = cart[0].uniqueKey || cart[0].id;
        window.removeFromCart(itemToRemove);
        const newCart = window.getCart();
        if (newCart.length === 1) {
          log('  Item removed successfully (2 items -> 1 item)');
          passed++;
        } else {
          log('  Remove failed - cart: ' + JSON.stringify(newCart), 'fail');
          failed++;
        }
      } catch(e) {
        log('  removeFromCart ERROR: ' + e.message, 'fail');
        failed++;
      }
      
      // Test 9: Cart persistence
      log('\nTEST 9: localStorage Persistence');
      try {
        const cart = window.getCart();
        const rawCart = localStorage.getItem('yaya_cart_v1');
        const parsedCart = JSON.parse(rawCart);
        if (JSON.stringify(cart) === JSON.stringify(parsedCart)) {
          log('  Cart persisted correctly in localStorage');
          passed++;
        } else {
          log('  Cart persistence mismatch', 'fail');
          failed++;
        }
      } catch(e) {
        log('  Persistence check ERROR: ' + e.message, 'fail');
        failed++;
      }
      
      // Test 10: Discount system
      log('\nTEST 10: Discount System');
      try {
        const cart = window.getCart();
        const subtotal = cart.reduce((s,it)=>{
          const p = window.PRODUCTS.find(x=>x.id===it.id);
          return p ? s + (p.price * it.qty) : s;
        },0);
        
        const discount = window.calculateDiscount(subtotal, 'WHIMSY', cart);
        if (discount && discount.valid && discount.amount > 0) {
          log('  Discount calculation works: $' + discount.amount.toFixed(2) + ' off');
          passed++;
        } else {
          log('  Discount calculation failed', 'fail');
          failed++;
        }
      } catch(e) {
        log('  Discount ERROR: ' + e.message, 'fail');
        failed++;
      }
      
      // Final summary
      log('\n=== TEST SUMMARY ===', 'warn');
      log('Passed: ' + passed, 'pass');
      if (failed > 0) {
        log('Failed: ' + failed, 'fail');
        log('\n❌ SOME TESTS FAILED', 'fail');
      } else {
        log('Failed: 0', 'pass');
        log('\n✅ ALL TESTS PASSED!', 'pass');
      }
    }
    
    // Auto-run tests after page load
    setTimeout(runAllTests, 500);
  </script>
</body>
</html>
