<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#E89CC8" />
    <meta name="robots" content="noindex, nofollow" />
    
    <title>Admin Login - Yaya Starchild</title>
    <meta name="description" content="Admin portal login for Yaya Starchild website management" />
    
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
      .admin-login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        z-index: 2;
      }
      
      .admin-login-form {
        background: var(--glass-strong);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: var(--radius);
        padding: 3rem;
        width: 100%;
        max-width: 480px;
        box-shadow: var(--shadow);
        animation: fadeInUp 0.6s ease-out;
      }
      
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .admin-login-title {
        font-family: 'Cinzel', serif;
        font-size: var(--text-2xl);
        font-weight: 600;
        color: #2c3e50;
        text-align: center;
        margin-bottom: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        text-shadow: 0 1px 2px rgba(255,255,255,0.8);
      }
      
      .admin-input-group {
        margin-bottom: 1.75rem;
      }
      
      .admin-input-group label {
        display: block;
        color: #2c3e50;
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: var(--text-base);
        margin-bottom: 0.75rem;
        text-shadow: 0 1px 2px rgba(255,255,255,0.8);
      }
      
      .admin-input-group input {
        width: 100%;
        padding: 1.2rem;
        border: 2px solid rgba(44,62,80,0.3);
        border-radius: 12px;
        background: rgba(255,255,255,0.9);
        backdrop-filter: blur(5px);
        color: #2c3e50;
        font-family: 'Cormorant Garamond', serif;
        font-size: var(--text-base);
        transition: all 0.3s ease;
        min-height: var(--min-touch-size);
      }
      
      .admin-input-group input:focus {
        outline: none;
        border-color: var(--pink);
        box-shadow: 0 0 25px rgba(232, 156, 200, 0.4), var(--focus-shadow);
        background: rgba(255,255,255,0.15);
      }
      
      .admin-input-group input::placeholder {
        color: rgba(44,62,80,0.6);
        font-style: italic;
      }
      
      .admin-login-btn {
        width: 100%;
        padding: 1.2rem 2rem;
        background: linear-gradient(135deg, var(--pink), var(--purple));
        color: var(--white);
        border: none;
        border-radius: 12px;
        font-family: 'Cinzel', serif;
        font-size: var(--text-lg);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 1.5rem;
        min-height: var(--min-touch-size);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        text-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
      
      .admin-login-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 50px rgba(232, 156, 200, 0.5);
        background: linear-gradient(135deg, var(--pink-dark), var(--purple-dark));
      }
      
      .admin-error {
        background: rgba(255, 107, 107, 0.15);
        border: 1px solid rgba(255, 107, 107, 0.3);
        border-radius: 8px;
        color: #ff9999;
        padding: 0.75rem;
        margin: 1rem 0;
        font-size: var(--text-sm);
        text-align: center;
        backdrop-filter: blur(5px);
        animation: shake 0.5s ease-in-out;
      }
      
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }
      
      .admin-success {
        background: rgba(76, 175, 80, 0.15);
        border: 1px solid rgba(76, 175, 80, 0.3);
        border-radius: 8px;
        color: #90ee90;
        padding: 0.75rem;
        margin: 1rem 0;
        font-size: var(--text-sm);
        text-align: center;
        backdrop-filter: blur(5px);
      }
      
      @media (max-width: 768px) {
        .admin-login-form {
          padding: 2rem;
          margin: 1rem;
        }
        
        .admin-login-title {
          font-size: var(--text-xl);
        }
      }
      
      .admin-error {
        background: rgba(255, 107, 107, 0.15);
        border: 1px solid rgba(255, 107, 107, 0.3);
        border-radius: 8px;
        color: #ff9999;
        padding: 0.75rem;
        margin: 1rem 0;
        font-size: var(--text-sm);
        text-align: center;
        backdrop-filter: blur(5px);
        animation: shake 0.5s ease-in-out;
        display: none;
      }
      
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }
      
      .admin-success {
        background: rgba(76, 175, 80, 0.15);
        border: 1px solid rgba(76, 175, 80, 0.3);
        border-radius: 8px;
        color: #90ee90;
        padding: 0.75rem;
        margin: 1rem 0;
        font-size: var(--text-sm);
        text-align: center;
        backdrop-filter: blur(5px);
      }
      
      .back-to-site {
        text-align: center;
        margin-top: 2.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid rgba(255,255,255,0.2);
      }
      
      .back-to-site a {
        color: rgba(255,255,255,0.8);
        text-decoration: none;
        font-family: 'Cormorant Garamond', serif;
        font-size: var(--text-sm);
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        backdrop-filter: blur(5px);
      }
      
      .back-to-site a:hover {
        color: var(--white);
        background: rgba(255,255,255,0.1);
        text-shadow: 0 1px 5px rgba(255,255,255,0.3);
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <div class="admin-login-container">
      <form class="admin-login-form" id="admin-login-form">
        <h1 class="admin-login-title">
          <i class="fas fa-crown"></i>
          Admin Portal
        </h1>
        
        <div id="admin-error" class="admin-error">
          Invalid credentials. Please try again.
        </div>
        
        <div class="admin-input-group">
          <label for="admin-username">Username</label>
          <input type="text" id="admin-username" name="username" placeholder="Enter username" required autocomplete="username" />
        </div>
        
        <div class="admin-input-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" name="password" placeholder="Enter password" required autocomplete="current-password" />
        </div>
        
        <button type="submit" class="admin-login-btn">
          <i class="fas fa-sign-in-alt"></i> Login to Admin Portal
        </button>
        
        <div class="back-to-site">
          <a href="index.html">
            <i class="fas fa-arrow-left"></i> Back to Website
          </a>
        </div>
      </form>
    </div>

    <script>
      document.getElementById('admin-login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('admin-username').value;
        const password = document.getElementById('admin-password').value;
        const errorDiv = document.getElementById('admin-error');
        
        // Simple authentication (in production, this should be server-side with proper security)
        if (username === 'AdminYaya' && password === 'poem_123') {
          // Store session
          sessionStorage.setItem('adminAuthenticated', 'true');
          sessionStorage.setItem('adminLoginTime', Date.now().toString());
          
          // Redirect to admin dashboard
          window.location.href = 'admin-dashboard.html';
        } else {
          errorDiv.style.display = 'block';
          
          // Clear error after 3 seconds
          setTimeout(() => {
            errorDiv.style.display = 'none';
          }, 3000);
        }
      });
      
      // Check if already logged in
      if (sessionStorage.getItem('adminAuthenticated') === 'true') {
        const loginTime = parseInt(sessionStorage.getItem('adminLoginTime') || '0');
        const now = Date.now();
        
        // Session expires after 4 hours
        if (now - loginTime < 4 * 60 * 60 * 1000) {
          window.location.href = 'admin-dashboard.html';
        } else {
          // Clear expired session
          sessionStorage.removeItem('adminAuthenticated');
          sessionStorage.removeItem('adminLoginTime');
        }
      }
    </script>
  </body>
</html>
