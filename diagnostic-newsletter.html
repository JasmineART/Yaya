<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EmailJS Newsletter Diagnostic - Yaya Starchild</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .test-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 2rem;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
    }
    .test-section {
      margin: 2rem 0;
      padding: 1.5rem;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    button {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      margin: 0.5rem;
      font-size: 1rem;
      font-family: inherit;
    }
    button:hover {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.5);
    }
    input {
      padding: 0.75rem;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1rem;
      margin: 0.5rem;
      min-width: 300px;
    }
    input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .log {
      background: rgba(0,0,0,0.3);
      color: #fff;
      padding: 1rem;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.85rem;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 1rem;
      white-space: pre-wrap;
    }
    .status {
      padding: 1rem;
      margin: 1rem 0;
      border-radius: 8px;
      font-weight: 600;
    }
    .status.success {
      background: rgba(76, 175, 80, 0.3);
      border: 2px solid #4CAF50;
    }
    .status.error {
      background: rgba(255, 107, 107, 0.3);
      border: 2px solid #ff6b6b;
    }
    .status.warning {
      background: rgba(255, 193, 7, 0.3);
      border: 2px solid #FFC107;
    }
    .status.info {
      background: rgba(33, 150, 243, 0.3);
      border: 2px solid #2196F3;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h1><i class="fas fa-envelope"></i> EmailJS Newsletter Diagnostic</h1>
    <p class="lead">Complete troubleshooting for newsletter signup system</p>
    
    <div class="test-section">
      <h3>Step 1: Check EmailJS Configuration</h3>
      <button onclick="checkConfig()">Check Configuration</button>
      <div id="config-status"></div>
    </div>
    
    <div class="test-section">
      <h3>Step 2: Test EmailJS Library Loading</h3>
      <button onclick="testLibraryLoad()">Test Library Load</button>
      <div id="library-status"></div>
    </div>
    
    <div class="test-section">
      <h3>Step 3: Test Newsletter Signup Function</h3>
      <input type="email" id="test-email" placeholder="test@example.com" value="test@example.com" />
      <button onclick="testNewsletterSignup()">Test Newsletter Signup</button>
      <div id="newsletter-status"></div>
    </div>
    
    <div class="test-section">
      <h3>Step 4: Test Direct EmailJS Call</h3>
      <button onclick="testDirectEmailJS()">Test Direct EmailJS Send</button>
      <div id="direct-status"></div>
    </div>
    
    <div class="test-section">
      <h3>Step 5: Test Newsletter Form (As User Would)</h3>
      <form id="newsletter-form" onsubmit="return false;">
        <input type="email" id="newsletter-email" placeholder="your@email.com" required />
        <button type="button" onclick="testFormSubmit()">Submit Form</button>
      </form>
      <div id="form-status"></div>
    </div>
    
    <div class="test-section">
      <h3>Debug Log</h3>
      <button onclick="clearLog()">Clear Log</button>
      <div id="log" class="log"></div>
    </div>
  </div>
  
  <!-- Load EmailJS and your scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="simple-email.js"></script>
  <script src="app.js"></script>
  
  <script>
    const logEl = document.getElementById('log');
    
    function log(message, type = 'info') {
      const time = new Date().toLocaleTimeString();
      const icon = {
        'info': 'ℹ️',
        'success': '✅',
        'error': '❌',
        'warning': '⚠️'
      }[type] || 'ℹ️';
      
      logEl.innerHTML += `[${time}] ${icon} ${message}\n`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(`${icon} ${message}`);
    }
    
    function clearLog() {
      logEl.innerHTML = '';
      log('Log cleared');
    }
    
    function showStatus(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.innerHTML = `<div class="status ${type}">${message}</div>`;
    }
    
    // Test 1: Check Configuration
    function checkConfig() {
      log('Checking EmailJS configuration...', 'info');
      
      // Check if simple-email.js loaded
      if (typeof EMAILJS_CONFIG === 'undefined') {
        showStatus('config-status', '❌ EMAILJS_CONFIG not found! simple-email.js may not be loaded.', 'error');
        log('ERROR: EMAILJS_CONFIG is undefined', 'error');
        return;
      }
      
      log('EMAILJS_CONFIG found', 'success');
      log(`Service ID: ${EMAILJS_CONFIG.serviceId}`, 'info');
      log(`Newsletter Template: ${EMAILJS_CONFIG.newsletterTemplateId}`, 'info');
      log(`User ID: ${EMAILJS_CONFIG.userId}`, 'info');
      
      // Check if all required fields are present
      const required = ['serviceId', 'newsletterTemplateId', 'userId'];
      const missing = required.filter(key => !EMAILJS_CONFIG[key]);
      
      if (missing.length > 0) {
        showStatus('config-status', `❌ Missing configuration: ${missing.join(', ')}`, 'error');
        log(`ERROR: Missing config fields: ${missing.join(', ')}`, 'error');
        return;
      }
      
      showStatus('config-status', `✅ Configuration looks good!<br>
        Service: ${EMAILJS_CONFIG.serviceId}<br>
        Template: ${EMAILJS_CONFIG.newsletterTemplateId}<br>
        User ID: ${EMAILJS_CONFIG.userId}`, 'success');
      log('Configuration check passed', 'success');
    }
    
    // Test 2: Library Loading
    function testLibraryLoad() {
      log('Testing EmailJS library...', 'info');
      
      if (typeof emailjs === 'undefined') {
        showStatus('library-status', '❌ EmailJS library not loaded! Check CDN link.', 'error');
        log('ERROR: emailjs is undefined', 'error');
        return;
      }
      
      log('EmailJS library loaded successfully', 'success');
      
      // Check if it has the send method
      if (typeof emailjs.send !== 'function') {
        showStatus('library-status', '❌ EmailJS library loaded but send() method not found!', 'error');
        log('ERROR: emailjs.send is not a function', 'error');
        return;
      }
      
      showStatus('library-status', '✅ EmailJS library loaded and ready!<br>Version: ' + (emailjs.version || 'Unknown'), 'success');
      log('EmailJS library fully functional', 'success');
    }
    
    // Test 3: Newsletter Signup Function
    async function testNewsletterSignup() {
      log('Testing sendNewsletterSignup function...', 'info');
      const email = document.getElementById('test-email').value;
      
      if (!email) {
        showStatus('newsletter-status', '❌ Please enter an email address', 'error');
        return;
      }
      
      if (typeof sendNewsletterSignup === 'undefined') {
        showStatus('newsletter-status', '❌ sendNewsletterSignup function not found!', 'error');
        log('ERROR: sendNewsletterSignup is undefined', 'error');
        return;
      }
      
      log(`Calling sendNewsletterSignup with email: ${email}`, 'info');
      showStatus('newsletter-status', '⏳ Sending...', 'info');
      
      try {
        const result = await sendNewsletterSignup(email, 'diagnostic-test');
        log(`Result: ${JSON.stringify(result)}`, 'info');
        
        if (result && result.success) {
          showStatus('newsletter-status', `✅ Newsletter signup successful!<br>Message ID: ${result.messageId || 'N/A'}`, 'success');
          log('Newsletter signup succeeded', 'success');
        } else {
          showStatus('newsletter-status', `❌ Newsletter signup failed!<br>Error: ${result?.error || 'Unknown error'}`, 'error');
          log(`Newsletter signup failed: ${result?.error || 'Unknown'}`, 'error');
        }
      } catch (error) {
        showStatus('newsletter-status', `❌ Exception thrown: ${error.message}`, 'error');
        log(`Exception: ${error.message}`, 'error');
        console.error('Newsletter signup error:', error);
      }
    }
    
    // Test 4: Direct EmailJS Call
    async function testDirectEmailJS() {
      log('Testing direct EmailJS.send call...', 'info');
      showStatus('direct-status', '⏳ Sending direct email...', 'info');
      
      if (typeof emailjs === 'undefined') {
        showStatus('direct-status', '❌ EmailJS library not loaded', 'error');
        return;
      }
      
      if (typeof EMAILJS_CONFIG === 'undefined') {
        showStatus('direct-status', '❌ EMAILJS_CONFIG not found', 'error');
        return;
      }
      
      try {
        const params = {
          user_email: 'diagnostic-test@example.com',
          page: 'Diagnostic Test',
          timestamp: new Date().toLocaleString()
        };
        
        log(`Sending with params: ${JSON.stringify(params)}`, 'info');
        
        const response = await emailjs.send(
          EMAILJS_CONFIG.serviceId,
          EMAILJS_CONFIG.newsletterTemplateId,
          params,
          EMAILJS_CONFIG.userId
        );
        
        showStatus('direct-status', `✅ Direct EmailJS call successful!<br>Status: ${response.status}<br>Text: ${response.text}`, 'success');
        log(`Direct send succeeded: Status ${response.status}`, 'success');
      } catch (error) {
        showStatus('direct-status', `❌ Direct EmailJS call failed!<br>Error: ${error.message || error.text || 'Unknown'}`, 'error');
        log(`Direct send failed: ${error.message || error.text}`, 'error');
        console.error('Direct EmailJS error:', error);
      }
    }
    
    // Test 5: Form Submit (like user would do)
    async function testFormSubmit() {
      log('Testing newsletter form submission...', 'info');
      const email = document.getElementById('newsletter-email').value;
      
      if (!email) {
        showStatus('form-status', '❌ Please enter an email', 'error');
        return;
      }
      
      showStatus('form-status', '⏳ Submitting form...', 'info');
      log(`Form submit with email: ${email}`, 'info');
      
      try {
        // Simulate what the app.js does
        const emailResult = await sendNewsletterSignup(email, window.location.pathname);
        
        if (emailResult && emailResult.success) {
          showStatus('form-status', `✅ Form submission successful!<br>Email notification sent to faeriepoetics@gmail.com`, 'success');
          log('Form submission succeeded', 'success');
          document.getElementById('newsletter-form').reset();
        } else {
          showStatus('form-status', `❌ Form submission failed!<br>Error: ${emailResult?.error || 'Unknown'}`, 'error');
          log(`Form submission failed: ${emailResult?.error}`, 'error');
        }
      } catch (error) {
        showStatus('form-status', `❌ Exception: ${error.message}`, 'error');
        log(`Form exception: ${error.message}`, 'error');
      }
    }
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      log('=== EmailJS Newsletter Diagnostic Tool ===', 'info');
      log('Ready to troubleshoot!', 'success');
      log('Run tests in order (1-5) for best results', 'info');
      
      // Auto-run first two checks
      setTimeout(() => {
        log('\nAuto-running initial checks...', 'info');
        checkConfig();
        setTimeout(() => testLibraryLoad(), 500);
      }, 500);
    });
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</body>
</html>
