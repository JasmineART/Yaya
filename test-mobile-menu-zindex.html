<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Menu Z-Index Debug</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }
        
        .debug-info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 200000;
            max-width: 300px;
        }
        
        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            z-index: 100000;
            position: relative;
        }
        
        .hamburger-line {
            width: 24px;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        
        .hamburger.active .hamburger-line:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        
        .hamburger.active .hamburger-line:nth-child(2) {
            opacity: 0;
        }
        
        .hamburger.active .hamburger-line:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }
        
        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 100001;
        }
        
        .nav-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .nav {
            position: fixed;
            top: 0;
            right: -100%;
            height: 100vh;
            width: 280px;
            max-width: 85vw;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.98) 0%, rgba(118, 75, 162, 0.98) 100%);
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.3);
            padding: 5rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100002;
            overflow-y: auto;
        }
        
        .nav.active {
            right: 0;
        }
        
        .nav a {
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 1.2rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-align: left;
            display: block;
            color: white;
            text-decoration: none;
            position: relative;
            z-index: 1;
            pointer-events: auto;
            cursor: pointer;
        }
        
        .nav a:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(5px);
        }
        
        .click-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 0, 0.8);
            padding: 10px 20px;
            border-radius: 8px;
            display: none;
            z-index: 200000;
        }
    </style>
</head>
<body>
    <div class="debug-info" id="debugInfo">
        <h3>Z-Index Debug</h3>
        <div id="debugContent">Click hamburger to open menu</div>
    </div>
    
    <div class="test-header">
        <h1>Z-Index Test</h1>
        <button class="hamburger" id="hamburger">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>
    </div>
    
    <div class="nav-overlay" id="overlay"></div>
    
    <nav class="nav" id="nav">
        <a href="#home" data-link="home">Home</a>
        <a href="#shop" data-link="shop">Shop</a>
        <a href="#about" data-link="about">About</a>
        <a href="#cart" data-link="cart">Cart</a>
    </nav>
    
    <div class="click-indicator" id="clickIndicator">Link Clicked!</div>
    
    <div style="margin-top: 50px;">
        <h2>Instructions:</h2>
        <ol style="line-height: 2;">
            <li>Click the hamburger menu (top right)</li>
            <li>Try to click on the navigation links</li>
            <li>Watch the debug info for z-index values</li>
            <li>Check if links are clickable</li>
        </ol>
    </div>
    
    <script>
        const hamburger = document.getElementById('hamburger');
        const nav = document.getElementById('nav');
        const overlay = document.getElementById('overlay');
        const debugInfo = document.getElementById('debugContent');
        const clickIndicator = document.getElementById('clickIndicator');
        
        function updateDebug() {
            const hamburgerZ = window.getComputedStyle(hamburger).zIndex;
            const overlayZ = window.getComputedStyle(overlay).zIndex;
            const navZ = window.getComputedStyle(nav).zIndex;
            const isOpen = nav.classList.contains('active');
            
            debugInfo.innerHTML = `
                <strong>Status:</strong> ${isOpen ? 'OPEN' : 'CLOSED'}<br>
                <strong>Hamburger z-index:</strong> ${hamburgerZ}<br>
                <strong>Overlay z-index:</strong> ${overlayZ}<br>
                <strong>Nav z-index:</strong> ${navZ}<br>
                <strong>Overlay pointer-events:</strong> ${window.getComputedStyle(overlay).pointerEvents}<br>
                <strong>Nav pointer-events:</strong> ${window.getComputedStyle(nav).pointerEvents}
            `;
        }
        
        function toggleMenu() {
            const isOpen = nav.classList.contains('active');
            
            if (isOpen) {
                nav.classList.remove('active');
                hamburger.classList.remove('active');
                overlay.classList.remove('active');
                console.log('Menu closed');
            } else {
                nav.classList.add('active');
                hamburger.classList.add('active');
                overlay.classList.add('active');
                console.log('Menu opened');
            }
            
            updateDebug();
        }
        
        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMenu();
        });
        
        overlay.addEventListener('click', () => {
            console.log('Overlay clicked');
            toggleMenu();
        });
        
        const navLinks = nav.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const linkName = link.getAttribute('data-link');
                console.log('Link clicked:', linkName);
                
                clickIndicator.textContent = `${linkName.toUpperCase()} Clicked!`;
                clickIndicator.style.display = 'block';
                
                setTimeout(() => {
                    clickIndicator.style.display = 'none';
                }, 2000);
                
                toggleMenu();
            });
            
            // Debug: log mouse events
            link.addEventListener('mouseenter', () => {
                console.log('Mouse entered link:', link.getAttribute('data-link'));
            });
        });
        
        updateDebug();
        
        // Log window dimensions
        console.log('Window size:', window.innerWidth, 'x', window.innerHeight);
    </script>
</body>
</html>
