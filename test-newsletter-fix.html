<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter Test - Fixed</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 { margin-top: 0; }
    .form-inline {
      display: flex;
      gap: 10px;
      margin: 20px 0;
    }
    input[type="email"] {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      padding: 12px 24px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .log {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 14px;
    }
    .log-entry {
      margin: 5px 0;
      padding: 5px;
      border-left: 3px solid #4CAF50;
      padding-left: 10px;
    }
    .log-entry.error {
      border-left-color: #f44336;
      color: #ffcdd2;
    }
    .log-entry.success {
      border-left-color: #4CAF50;
      color: #c8e6c9;
    }
    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
    }
    .status.loading {
      background: rgba(255,193,7,0.3);
    }
    .status.success {
      background: rgba(76,175,80,0.3);
    }
    .status.error {
      background: rgba(244,67,54,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Newsletter Subscription Test</h1>
    <p>This page tests the fixed newsletter subscription flow with improved error handling.</p>
    
    <form id="newsletter-form" class="form-inline">
      <input 
        type="email" 
        id="newsletter-email" 
        placeholder="Enter your email ✨" 
        required 
        aria-label="Email"
      />
      <button type="submit">Subscribe</button>
    </form>
    
    <div id="status"></div>
    
    <h3>Console Log:</h3>
    <div class="log" id="console-log"></div>
    
    <h3>Diagnostics:</h3>
    <div class="log" id="diagnostics">
      <div class="log-entry">Checking dependencies...</div>
    </div>
  </div>

  <!-- EmailJS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  
  <!-- Simple Email Notifications -->
  <script src="simple-email.js"></script>
  
  <!-- App JS (contains newsletter form handler) -->
  <script src="app.js"></script>

  <script>
    // Override console methods to capture logs
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;
    
    function addToLog(message, type = 'info') {
      const logDiv = document.getElementById('console-log');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }
    
    console.log = function(...args) {
      originalLog.apply(console, args);
      addToLog(args.join(' '), 'info');
    };
    
    console.error = function(...args) {
      originalError.apply(console, args);
      addToLog(args.join(' '), 'error');
    };
    
    console.warn = function(...args) {
      originalWarn.apply(console, args);
      addToLog(args.join(' '), 'error');
    };
    
    // Override alert to show in page
    window.alert = function(message) {
      const statusDiv = document.getElementById('status');
      statusDiv.textContent = message;
      statusDiv.className = 'status ' + (message.includes('subscribed') ? 'success' : 'error');
      addToLog('ALERT: ' + message, message.includes('subscribed') ? 'success' : 'error');
    };
    
    // Run diagnostics
    window.addEventListener('DOMContentLoaded', () => {
      const diagDiv = document.getElementById('diagnostics');
      
      function addDiagnostic(message, success = true) {
        const entry = document.createElement('div');
        entry.className = `log-entry ${success ? 'success' : 'error'}`;
        entry.textContent = (success ? '✅ ' : '❌ ') + message;
        diagDiv.appendChild(entry);
      }
      
      // Clear initial message
      diagDiv.innerHTML = '';
      
      // Check EmailJS
      if (typeof emailjs !== 'undefined') {
        addDiagnostic('EmailJS library loaded');
      } else {
        addDiagnostic('EmailJS library NOT loaded', false);
      }
      
      // Check sendNewsletterSignup
      if (typeof window.sendNewsletterSignup === 'function') {
        addDiagnostic('sendNewsletterSignup function available');
      } else {
        addDiagnostic('sendNewsletterSignup function NOT available', false);
      }
      
      // Check newsletter form
      const form = document.getElementById('newsletter-form');
      if (form) {
        addDiagnostic('Newsletter form found');
      } else {
        addDiagnostic('Newsletter form NOT found', false);
      }
      
      // Check if initNewsletterForm was called
      if (typeof window.initNewsletterForm === 'function') {
        addDiagnostic('initNewsletterForm function available');
      } else {
        addDiagnostic('initNewsletterForm function NOT available', false);
      }
      
      addDiagnostic('All checks complete');
    });
  </script>
</body>
</html>
