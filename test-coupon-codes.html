<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Coupon Code Test - Yaya Starchild</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .test-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 2rem;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
    }
    .test-section {
      margin: 2rem 0;
      padding: 1.5rem;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    button {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      margin: 0.5rem;
      font-size: 1rem;
      font-family: inherit;
    }
    button:hover {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.5);
    }
    .log {
      background: rgba(0,0,0,0.3);
      color: #fff;
      padding: 1rem;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.85rem;
      max-height: 400px;
      overflow-y: auto;
      margin-top: 1rem;
      white-space: pre-wrap;
    }
    .result {
      padding: 1rem;
      margin: 1rem 0;
      border-radius: 8px;
      font-weight: 600;
    }
    .result.success {
      background: rgba(76, 175, 80, 0.3);
      border: 2px solid #4CAF50;
    }
    .result.error {
      background: rgba(255, 107, 107, 0.3);
      border: 2px solid #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h1><i class="fas fa-tags"></i> Coupon Code Test Suite</h1>
    <p class="lead">Testing new discount codes: PASTEL, SUNCATCHER, WHIMSY</p>
    
    <div class="test-section">
      <h3>Setup Test Cart</h3>
      <button onclick="setupCart1()">Cart 1: 1 Book ($24.99)</button>
      <button onclick="setupCart2()">Cart 2: 2 Books ($49.98)</button>
      <button onclick="setupCart3()">Cart 3: 3 Stickers ($9.00)</button>
      <button onclick="setupCart4()">Cart 4: Mixed (2 books + 1 sticker = $52.98)</button>
      <button onclick="clearTestCart()">Clear Cart</button>
      <div id="cart-info" style="margin-top: 1rem; padding: 1rem; background: rgba(255,255,255,0.1); border-radius: 8px;"></div>
    </div>
    
    <div class="test-section">
      <h3>Test Discount Codes</h3>
      <button onclick="testPastel()">Test PASTEL (Buy 1, Get 2nd 50% Off)</button>
      <button onclick="testSuncatcher()">Test SUNCATCHER (15% Off)</button>
      <button onclick="testWhimsy()">Test WHIMSY (25% Off)</button>
      <div id="test-results"></div>
    </div>
    
    <div class="test-section">
      <h3>Debug Log</h3>
      <div id="log" class="log"></div>
    </div>
  </div>
  
  <script src="products.js"></script>
  <script src="app.js"></script>
  <script>
    const logEl = document.getElementById('log');
    const resultsEl = document.getElementById('test-results');
    const cartInfoEl = document.getElementById('cart-info');
    
    function log(message) {
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML += `[${time}] ${message}\n`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(message);
    }
    
    function clearTestCart() {
      localStorage.removeItem('yaya_cart_v1');
      localStorage.removeItem('yaya_discount_v1');
      updateCartInfo();
      log('Cart and discounts cleared');
    }
    
    function updateCartInfo() {
      const cart = getCart();
      const subtotal = cart.reduce((s, it) => {
        const p = window.PRODUCTS.find(x => x.id === it.id);
        return p ? s + (p.price * it.qty) : s;
      }, 0);
      
      cartInfoEl.innerHTML = `
        <strong>Current Cart:</strong><br>
        Items: ${cart.length} types, ${cart.reduce((s, it) => s + it.qty, 0)} total items<br>
        Subtotal: $${subtotal.toFixed(2)}
      `;
    }
    
    function setupCart1() {
      clearTestCart();
      window.addToCart(1, 1, {}); // 1 signed book
      updateCartInfo();
      log('Cart 1 setup: 1 Book ($24.99)');
    }
    
    function setupCart2() {
      clearTestCart();
      window.addToCart(1, 2, {}); // 2 signed books
      updateCartInfo();
      log('Cart 2 setup: 2 Books ($49.98)');
    }
    
    function setupCart3() {
      clearTestCart();
      window.addToCart(3, 1, {variantId: 'dancing', variantName: 'The Ball'}); 
      window.addToCart(3, 1, {variantId: 'sunflower', variantName: 'Bloom'}); 
      window.addToCart(3, 1, {variantId: 'ballerina', variantName: 'Ballerina'}); 
      updateCartInfo();
      log('Cart 3 setup: 3 Stickers ($9.00)');
    }
    
    function setupCart4() {
      clearTestCart();
      window.addToCart(1, 2, {}); // 2 books @ $24.99
      window.addToCart(3, 1, {variantId: 'dancing', variantName: 'The Ball'}); // 1 sticker @ $3
      updateCartInfo();
      log('Cart 4 setup: 2 Books + 1 Sticker ($52.98)');
    }
    
    function testPastel() {
      const cart = getCart();
      const subtotal = cart.reduce((s, it) => {
        const p = window.PRODUCTS.find(x => x.id === it.id);
        return p ? s + (p.price * it.qty) : s;
      }, 0);
      
      log('\\n=== Testing PASTEL Code ===');
      log(`Cart subtotal: $${subtotal.toFixed(2)}`);
      
      const result = calculateDiscount(subtotal, 'PASTEL', cart);
      
      if (result.valid) {
        const finalTotal = subtotal - result.amount;
        resultsEl.innerHTML = `
          <div class="result success">
            ✅ PASTEL: ${result.description}<br>
            Subtotal: $${subtotal.toFixed(2)}<br>
            Discount: -$${result.amount.toFixed(2)}<br>
            <strong>Final: $${finalTotal.toFixed(2)}</strong>
          </div>
        `;
        log(`✅ PASTEL valid: Discount $${result.amount.toFixed(2)}, Final: $${finalTotal.toFixed(2)}`);
      } else {
        resultsEl.innerHTML = `
          <div class="result error">
            ❌ PASTEL: ${result.message}
          </div>
        `;
        log(`❌ PASTEL failed: ${result.message}`);
      }
    }
    
    function testSuncatcher() {
      const cart = getCart();
      const subtotal = cart.reduce((s, it) => {
        const p = window.PRODUCTS.find(x => x.id === it.id);
        return p ? s + (p.price * it.qty) : s;
      }, 0);
      
      log('\\n=== Testing SUNCATCHER Code ===');
      log(`Cart subtotal: $${subtotal.toFixed(2)}`);
      
      const result = calculateDiscount(subtotal, 'SUNCATCHER', cart);
      
      if (result.valid) {
        const finalTotal = subtotal - result.amount;
        resultsEl.innerHTML = `
          <div class="result success">
            ✅ SUNCATCHER: ${result.description}<br>
            Subtotal: $${subtotal.toFixed(2)}<br>
            Discount: -$${result.amount.toFixed(2)} (15%)<br>
            <strong>Final: $${finalTotal.toFixed(2)}</strong>
          </div>
        `;
        log(`✅ SUNCATCHER valid: Discount $${result.amount.toFixed(2)}, Final: $${finalTotal.toFixed(2)}`);
      } else {
        resultsEl.innerHTML = `
          <div class="result error">
            ❌ SUNCATCHER: ${result.message}
          </div>
        `;
        log(`❌ SUNCATCHER failed: ${result.message}`);
      }
    }
    
    function testWhimsy() {
      const cart = getCart();
      const subtotal = cart.reduce((s, it) => {
        const p = window.PRODUCTS.find(x => x.id === it.id);
        return p ? s + (p.price * it.qty) : s;
      }, 0);
      
      log('\\n=== Testing WHIMSY Code ===');
      log(`Cart subtotal: $${subtotal.toFixed(2)}`);
      
      const result = calculateDiscount(subtotal, 'WHIMSY', cart);
      
      if (result.valid) {
        const finalTotal = subtotal - result.amount;
        resultsEl.innerHTML = `
          <div class="result success">
            ✅ WHIMSY: ${result.description}<br>
            Subtotal: $${subtotal.toFixed(2)}<br>
            Discount: -$${result.amount.toFixed(2)} (25%)<br>
            <strong>Final: $${finalTotal.toFixed(2)}</strong>
          </div>
        `;
        log(`✅ WHIMSY valid: Discount $${result.amount.toFixed(2)}, Final: $${finalTotal.toFixed(2)}`);
      } else {
        resultsEl.innerHTML = `
          <div class="result error">
            ❌ WHIMSY: ${result.message}
          </div>
        `;
        log(`❌ WHIMSY failed: ${result.message}`);
      }
    }
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      log('Coupon test page loaded');
      log(`Found ${window.PRODUCTS.length} products`);
      log('Available codes: PASTEL, SUNCATCHER, WHIMSY\\n');
      updateCartInfo();
    });
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</body>
</html>
