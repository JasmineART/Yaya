<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmailJS Connection Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255,255,255,0.1);
      padding: 2rem;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }
    .test-section {
      background: rgba(255,255,255,0.1);
      padding: 1.5rem;
      margin: 1rem 0;
      border-radius: 10px;
    }
    button {
      background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
      border: 2px solid rgba(255,255,255,0.4);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 25px;
      cursor: pointer;
      margin: 0.5rem;
      transition: all 0.3s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    .log {
      background: rgba(0,0,0,0.3);
      padding: 1rem;
      border-radius: 5px;
      margin-top: 1rem;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.9rem;
    }
    .success { color: #4CAF50; }
    .error { color: #f44336; }
    .warning { color: #FF9800; }
    .info { color: #2196F3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 EmailJS Connection Diagnostic</h1>
    <p>This tool will help diagnose EmailJS connection issues on your local server.</p>
    
    <div class="test-section">
      <h3>Step 1: Basic Configuration Check</h3>
      <button onclick="checkConfig()">Check EmailJS Config</button>
      <div id="config-result"></div>
    </div>
    
    <div class="test-section">
      <h3>Step 2: Library Loading Test</h3>
      <button onclick="checkLibrary()">Test EmailJS Library</button>
      <div id="library-result"></div>
    </div>
    
    <div class="test-section">
      <h3>Step 3: Direct EmailJS Test</h3>
      <input type="email" id="test-email" placeholder="test@example.com" value="test@example.com" style="padding: 0.5rem; margin: 0.5rem; border-radius: 5px; border: 1px solid #ccc;">
      <button onclick="testDirectEmailJS()">Send Test Email</button>
      <div id="emailjs-result"></div>
    </div>
    
    <div class="test-section">
      <h3>Step 4: Network & CORS Check</h3>
      <button onclick="checkNetwork()">Check Network Issues</button>
      <div id="network-result"></div>
    </div>
    
    <div class="test-section">
      <h3>Diagnostic Log</h3>
      <button onclick="clearLog()">Clear Log</button>
      <div id="log" class="log">
        <div class="info">Diagnostic tool ready...</div>
      </div>
    </div>
  </div>

  <!-- Load EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = type;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '<div class="info">Log cleared...</div>';
    }

    function showResult(elementId, message, type) {
      const element = document.getElementById(elementId);
      element.innerHTML = `<div class="${type}">${message}</div>`;
    }

    // Step 1: Check Configuration
    function checkConfig() {
      log('Checking EmailJS configuration...', 'info');
      
      const config = {
        serviceId: 'service_5sl3jkm',
        newsletterTemplateId: 'newsubs_kw32jj9',
        orderTemplateId: 'orderconfirm_vz7exbv',
        userId: '_Y8GKbzV16a70S4PI'
      };
      
      let result = '✅ Configuration loaded:<br>';
      result += `Service ID: ${config.serviceId}<br>`;
      result += `Newsletter Template: ${config.newsletterTemplateId}<br>`;
      result += `User ID: ${config.userId}`;
      
      showResult('config-result', result, 'success');
      log('Configuration check complete', 'success');
    }

    // Step 2: Check Library
    function checkLibrary() {
      log('Checking EmailJS library...', 'info');
      
      if (typeof emailjs === 'undefined') {
        showResult('library-result', '❌ EmailJS library not loaded', 'error');
        log('EmailJS library NOT loaded', 'error');
        return;
      }
      
      try {
        emailjs.init('_Y8GKbzV16a70S4PI');
        showResult('library-result', '✅ EmailJS library loaded and initialized', 'success');
        log('EmailJS library successfully initialized', 'success');
      } catch (error) {
        showResult('library-result', `❌ EmailJS initialization failed: ${error.message}`, 'error');
        log(`EmailJS init error: ${error.message}`, 'error');
      }
    }

    // Step 3: Direct EmailJS Test
    async function testDirectEmailJS() {
      const email = document.getElementById('test-email').value;
      
      if (!email) {
        showResult('emailjs-result', '❌ Please enter a test email', 'error');
        return;
      }
      
      log(`Testing direct EmailJS send to ${email}...`, 'info');
      showResult('emailjs-result', '⏳ Sending test email...', 'info');
      
      try {
        if (typeof emailjs === 'undefined') {
          throw new Error('EmailJS library not loaded');
        }
        
        // Initialize EmailJS
        emailjs.init('_Y8GKbzV16a70S4PI');
        
        // Test parameters
        const templateParams = {
          to_email: 'faeriepoetics@gmail.com',
          user_email: email,
          page: 'Diagnostic Test',
          timestamp: new Date().toLocaleString(),
          from_name: 'EmailJS Diagnostic Tool',
          reply_to: email
        };
        
        log(`Sending with params: ${JSON.stringify(templateParams)}`, 'info');
        
        const response = await emailjs.send(
          'service_5sl3jkm',
          'newsubs_kw32jj9',
          templateParams,
          '_Y8GKbzV16a70S4PI'
        );
        
        showResult('emailjs-result', `✅ EmailJS test successful! Response: ${response.text}`, 'success');
        log(`EmailJS send successful: ${response.text}`, 'success');
        
      } catch (error) {
        showResult('emailjs-result', `❌ EmailJS test failed: ${error.message}`, 'error');
        log(`EmailJS send failed: ${error.message}`, 'error');
        
        // Log additional error details
        if (error.text) log(`Error text: ${error.text}`, 'error');
        if (error.status) log(`Error status: ${error.status}`, 'error');
      }
    }

    // Step 4: Network Check
    function checkNetwork() {
      log('Checking network connectivity...', 'info');
      
      let results = [];
      
      // Check if we're on localhost
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        results.push('⚠️ Running on localhost - this is fine for EmailJS');
      }
      
      // Check HTTPS
      if (location.protocol === 'https:') {
        results.push('✅ HTTPS connection');
      } else {
        results.push('⚠️ HTTP connection - EmailJS works on localhost but may have issues on some networks');
      }
      
      // Test basic connectivity
      fetch('https://api.emailjs.com/api/v1.0/email/send', {
        method: 'HEAD',
        mode: 'no-cors'
      }).then(() => {
        results.push('✅ Can reach EmailJS API servers');
        showResult('network-result', results.join('<br>'), 'info');
        log('Network check complete - no major issues detected', 'success');
      }).catch(error => {
        results.push('❌ Cannot reach EmailJS API servers - check internet connection');
        showResult('network-result', results.join('<br>'), 'warning');
        log('Network connectivity issues detected', 'warning');
      });
    }

    // Auto-run initial checks
    window.onload = function() {
      log('Diagnostic tool loaded', 'success');
      setTimeout(checkConfig, 500);
      setTimeout(checkLibrary, 1000);
    };
  </script>
</body>
</html>
